name: WordPress 6.9 Test Suite [PHP 8.3-8.4]

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql-service:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: 'crab'
          MYSQL_DATABASE: pc_core_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect || mysqladmin ping -uroot -pcrab"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.3', '8.4']

    defaults:
      run:
        working-directory: mu-plugins/karkinos-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, intl, pcov
          ini-values: post_max_size=256M, log_errors=1
          tools: composer

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-progress --no-interaction

      - name: Run test suite + analyse + sniff
        env:
          environment_github: true
        run: composer all
